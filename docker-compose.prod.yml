# Production compose — uses Neon (cloud Postgres), no local db service.
# Run: docker compose -f docker-compose.prod.yml up -d --build

services:
  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-https://collegechoice.in}
      JWT_SECRET: ${JWT_SECRET}
      # Shared secret that gates the admin image-upload panel (/admin).
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      # Persistent on-disk location for uploaded college photos.
      UPLOAD_DIR: /data/uploads
      NODE_ENV: production
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - uploads:/data/uploads

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://collegechoice.in}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://collegechoice.in}
      # Build-time SSG fetches the public URL; resolve it to this VPS (where
      # nginx+API are live) instead of stale public DNS / old hosting.
      extra_hosts:
        - "collegechoice.in:187.127.139.154"
        - "www.collegechoice.in:187.127.139.154"
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://collegechoice.in}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://collegechoice.in}
      # SSR fetches the API directly over the Docker network — avoids public DNS.
      INTERNAL_API_URL: http://api:4000
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  uploads:
