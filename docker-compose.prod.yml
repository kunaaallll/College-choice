# Production compose — uses Neon (cloud Postgres), no local db service.
# Run: docker compose -f docker-compose.prod.yml up -d --build

services:
  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-https://collegechoice.in}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    ports:
      - "127.0.0.1:4000:4000"

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://collegechoice.in}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://collegechoice.in}
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
