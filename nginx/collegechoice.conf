# Nginx reverse proxy for collegechoice.in
# After deploy: certbot --nginx -d collegechoice.in -d www.collegechoice.in

server {
    listen 80;
    server_name collegechoice.in www.collegechoice.in;

    # Redirect www → non-www
    if ($host = www.collegechoice.in) {
        return 301 https://collegechoice.in$request_uri;
    }

    # Express API
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 40m;   # allow multi-image admin uploads
    }

    # Uploaded college photos (served by the API from its persistent volume)
    location /uploads/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Next.js web app (incl. WebSocket for HMR in dev, not needed in prod but harmless)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
